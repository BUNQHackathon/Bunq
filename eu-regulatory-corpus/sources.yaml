# ---------------------------------------------------------------------------
# National additions (per-jurisdiction)
# ---------------------------------------------------------------------------
national:
  ireland:
    # Tier 1 primary legislation — Acts (with revised/consolidated preferred)
    # and Statutory Instruments transposing EU directives.
    primary:
      # Statutory Instruments — EU directive transpositions
      - id: ie_si_2018_6
        kind: si
        year: 2018
        number: 6
        short_name: psd2_transposition
        title: "European Union (Payment Services) Regulations 2018"
        eu_relation: PSD2
      - id: ie_si_2011_183
        kind: si
        year: 2011
        number: 183
        short_name: emd2_transposition
        title: "European Communities (Electronic Money) Regulations 2011"
        eu_relation: EMD2
      - id: ie_si_2017_375
        kind: si
        year: 2017
        number: 375
        short_name: mifid2_transposition
        title: "European Union (Markets in Financial Instruments) Regulations 2017"
        eu_relation: MiFID II
      - id: ie_si_2010_281
        kind: si
        year: 2010
        number: 281
        short_name: ccd_transposition
        title: "European Communities (Consumer Credit Agreements) Regulations 2010"
        eu_relation: CCD
      - id: ie_si_2016_142
        kind: si
        year: 2016
        number: 142
        short_name: mcd_transposition
        title: "European Union (Consumer Mortgage Credit Agreements) Regulations 2016"
        eu_relation: MCD
      # Acts of the Oireachtas — prefer revised (consolidated) PDFs from LRC
      - id: ie_act_2010_6
        kind: act
        year: 2010
        number: 6
        short_name: cjml_aml_act
        title: "Criminal Justice (Money Laundering and Terrorist Financing) Act 2010"
        prefer_revised: true
      - id: ie_act_2018_7
        kind: act
        year: 2018
        number: 7
        short_name: data_protection_act
        title: "Data Protection Act 2018"
        prefer_revised: true
      - id: ie_act_1942_22
        kind: act
        year: 1942
        number: 22
        short_name: central_bank_act
        title: "Central Bank Act 1942"
        prefer_revised: true
      - id: ie_act_2013_26
        kind: act
        year: 2013
        number: 26
        short_name: cbi_supervision_enforcement_act
        title: "Central Bank (Supervision and Enforcement) Act 2013"
        prefer_revised: true
      - id: ie_act_2023_5
        kind: act
        year: 2023
        number: 5
        short_name: iaf_act
        title: "Central Bank (Individual Accountability Framework) Act 2023"
        prefer_revised: true
      - id: ie_act_1998_37
        kind: act
        year: 1998
        number: 37
        short_name: investor_compensation_act
        title: "Investor Compensation Act 1998"
        prefer_revised: true
      - id: ie_act_2007_19
        kind: act
        year: 2007
        number: 19
        short_name: consumer_protection_act
        title: "Consumer Protection Act 2007"
        prefer_revised: true
    # Central Bank of Ireland guidance — populated when CBI crawler is built (step 4)
    cbi:
      # Flat index pages — one fetch, collect all top-level PDF links.
      # Stale entries (IAF-via-fitness-probity, policy-and-guidance, crypto-asset)
      # have been replaced by entries under cbi_subpage_hubs below.
      index_pages:
        - https://www.centralbank.ie/regulation/consumer-protection/consumer-protection-codes-regulations
        - https://www.centralbank.ie/regulation/how-we-regulate/fitness-probity
        - https://www.centralbank.ie/regulation/industry-market-sectors/payment-institutions
        - https://www.centralbank.ie/regulation/industry-market-sectors/electronic-money-institutions
      # Specific PDFs the user explicitly requested, by canonical URL.
      direct_pdfs:
        - https://www.centralbank.ie/docs/default-source/publications/consultation-papers/cp138/cross-industry-guidance-on-outsourcing.pdf
        - https://www.centralbank.ie/docs/default-source/publications/consultation-papers/cp140/cross-industry-guidance-on-operational-resilience.pdf
      # Hub pages where the actual guidance lives across child pages. The
      # crawler fetches the hub, collects top-level PDFs, then walks each
      # in-section subpage (matching path_prefix) one level deep and collects
      # PDFs there too. Restricts traversal to the same path prefix so the
      # crawler doesn't escape into the rest of centralbank.ie.
      subpage_hubs:
        - hub: https://www.centralbank.ie/regulation/how-we-regulate/individual-accountability-framework
          path_prefix: /regulation/how-we-regulate/individual-accountability-framework
        - hub: https://www.centralbank.ie/regulation/markets-in-crypto-assets-regulation
          path_prefix: /regulation/markets-in-crypto-assets-regulation
        - hub: https://www.centralbank.ie/regulation/anti-money-laundering-and-countering-the-financing-of-terrorism
          path_prefix: /regulation/anti-money-laundering-and-countering-the-financing-of-terrorism
        - hub: https://www.centralbank.ie/regulation/industry-market-sectors/credit-institutions
          path_prefix: /regulation/industry-market-sectors/credit-institutions
    # Data Protection Commission — Tier 2, populated when DPC crawler is built
    dpc:
      index_pages:
        - https://www.dataprotection.ie/en/dpc-guidance
