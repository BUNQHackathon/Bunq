spring:
  application:
    name: java-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:file:.env[.properties]
  threads:
    virtual:
      enabled: true

server:
  servlet:
    context-path: /api/v1

aws:
  region: ${AWS_REGION:eu-central-1}
  dynamodb:
    sessions-table: ${AWS_DYNAMODB_SESSIONS_TABLE:launchlens-sessions}
    chat-messages-table: ${AWS_DYNAMODB_CHAT_MESSAGES_TABLE:launchlens-chat-messages}
    obligations-table: ${AWS_DYNAMODB_OBLIGATIONS_TABLE:launchlens-obligations}
    controls-table: ${AWS_DYNAMODB_CONTROLS_TABLE:launchlens-controls}
    mappings-table: ${AWS_DYNAMODB_MAPPINGS_TABLE:launchlens-mappings}
    gaps-table: ${AWS_DYNAMODB_GAPS_TABLE:launchlens-gaps}
    sanctions-hits-table: ${AWS_DYNAMODB_SANCTIONS_HITS_TABLE:launchlens-sanctions-hits}
    evidence-table: ${AWS_DYNAMODB_EVIDENCE_TABLE:launchlens-evidence}
    sanctions-entities-table: ${AWS_DYNAMODB_SANCTIONS_ENTITIES_TABLE:launchlens-sanctions-entities}
    audit-log-table: ${AWS_DYNAMODB_AUDIT_LOG_TABLE:launchlens-audit-log}
    documents-table: ${AWS_DYNAMODB_DOCUMENTS_TABLE:launchlens-documents}
    doc-jurisdictions-table: ${AWS_DYNAMODB_DOC_JURISDICTIONS_TABLE:launchlens-doc-jurisdictions}
    launches-table: ${AWS_DYNAMODB_LAUNCHES_TABLE:launchlens-launches}
    jurisdiction-runs-table: ${AWS_DYNAMODB_JURISDICTION_RUNS_TABLE:launchlens-jurisdiction-runs}
    session-cost-table: ${AWS_DYNAMODB_SESSION_COST_TABLE:launchlens-session-costs}
  bedrock:
    region: ${AWS_BEDROCK_REGION:eu-central-1}
    max-concurrent: ${BEDROCK_MAX_CONCURRENT:15}
    model-ids:
      opus:   ${AWS_BEDROCK_MODEL_IDS_OPUS:eu.anthropic.claude-opus-4-7}
      sonnet: ${AWS_BEDROCK_MODEL_IDS_SONNET:eu.anthropic.claude-sonnet-4-6}
      haiku:  ${AWS_BEDROCK_MODEL_IDS_HAIKU:eu.anthropic.claude-haiku-4-5-20251001-v1:0}
    claude-model-id: ${WARMUP_CLAUDE_MODEL_ID:eu.anthropic.claude-haiku-4-5-20251001-v1:0}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

chat:
  top-k-per-kb: 5
  top-n-merged: 10
  history-limit: 50

search:
  scan-cap: 500
  per-type-limit-max: 20

springdoc:
  api-docs:
    path: /openapi
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
